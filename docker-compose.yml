version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kiko-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kiko
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kiko-network

  redis:
    image: redis:7-alpine
    container_name: kiko-redis
    ports:
      - "6379:6379"
    networks:
      - kiko-network

  backend:
    build: ./backend
    container_name: kiko-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kiko?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=kiko_production_jwt_secret_token_19382
      - REFRESH_SECRET=kiko_production_refresh_secret_token_88923
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads-data:/app/uploads
    networks:
      - kiko-network

  frontend:
    build: ./frontend
    container_name: kiko-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kiko-network

volumes:
  pgdata:
  uploads-data:

networks:
  kiko-network:
    driver: bridge
